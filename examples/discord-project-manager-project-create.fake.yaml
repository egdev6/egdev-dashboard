minimal_template_result:
  status: planned
  selected_template: minimal
  project_slug: docs-site
  category_ref: category-demo-project-docs-site
  channel_fields:
    - context
    - strategy
    - tasks
  omitted_fields:
    - skills
    - decisions
    - qa
duplicate_name_results:
  - status: duplicate-same-project
    project_slug: web-app
    persisted_project_ref: project-demo-web-app
    duplicate_category_created: false
    duplicate_channels_created: false
    operator_message: Project slug already exists; open or inspect the existing project instead of creating a duplicate.
  - status: duplicate-name-review
    project_slug: web-app
    conflicting_project_ref: project-demo-other-web-app
    duplicate_category_created: false
    duplicate_channels_created: false
    operator_message: Project slug conflicts with another project; choose a different name or request maintainer review.
permission_failure_results:
  - status: blocked-permissions
    missing_capability: manage_channels
    writes_attempted_after_permission_preflight: false
    duplicate_category_created: false
    duplicate_channels_created: false
    operator_message: Missing channel-management permission; project create did not create or persist Discord topology.
  - status: blocked-permissions
    missing_capability: manage_messages_for_pin
    writes_attempted_after_permission_preflight: false
    duplicate_category_created: false
    duplicate_channels_created: false
    operator_message: Missing pin-message permission; project create did not create or persist Discord topology.
partial_failure_audit:
  status: partial-failure-needs-repair
  created_category_ref: category-demo-project-web-app
  created_channel_refs:
    - channel-demo-web-app-context
    - channel-demo-web-app-strategy
  missing_channel_fields:
    - tasks
  safe_retry_token_ref: retry-demo-web-app-create
  repair_issue_ref: 138
  duplicate_recreate_allowed_in_issue_135: false
unsupported_template_result:
  status: unsupported-template
  selected_template: custom
  writes_attempted_after_permission_preflight: false
metadata:
  note: This file contains fake Project Manager project creation data only and is safe to commit.
  no_real_guild_ids: true
  no_real_project_ids: true
  no_real_category_ids: true
  no_real_channel_ids: true
  no_real_message_ids: true
  no_credentials: true

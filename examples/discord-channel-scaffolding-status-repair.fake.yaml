    expected_category_ref: category-demo-project-web-app
    project_ref: project-demo-web-app
    project_slug: web-app
    idempotency_source_ref: examples/discord-project-manager-project-create.fake.yaml#first_run_result
    existing_fields:
      - context
      - skills
      - strategy
      - tasks
      - decisions
      - qa
    missing_fields: []
    unmanaged_channel_refs:
      - channel-demo-web-app-random-notes
    unsafe_missing_id_fields: []
    status_result: unmanaged-present
    write_attempted: false
    operator_message: An unmanaged extra channel is visible inside a managed category; no destructive action was proposed by default.
    repair_preview:
      status: no-destructive-action
      permission_preflight_status: ready
      permission_missing_capabilities: []
      approval_state: not-requested
      write_executed: false
      proposed_actions: []
    audit_ref: audit-demo-status-project-unmanaged-extra
audit_outputs:
  - audit_ref: audit-demo-status-global-intact-rerun
    runtime_namespace: discord-project-manager/runtime/discord/<guild-id>/<channel-id>
    retained_raw_message: false
    safe_fake_refs_only: true
  - audit_ref: audit-demo-repair-global-missing-config
    runtime_namespace: discord-project-manager/runtime/discord/<guild-id>/<channel-id>
    retained_raw_message: false
    safe_fake_refs_only: true
  - audit_ref: audit-demo-status-project-renamed-linked
    runtime_namespace: discord-project-manager/runtime/discord/<guild-id>/<channel-id>
    retained_raw_message: false

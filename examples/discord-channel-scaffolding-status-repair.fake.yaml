schema_version: 1
fixture_type: fake-demo
safe_for_repo: true
privacy_reviewed: true
contract: discord-channel-scaffolding-status-repair
issue_ref: 138
live_discord_validation_proven: false
runtime_enforcement_proven: false
uses_real_discord_ids: false
raw_discord_chat_logs_included: false
durable_memory_writes_allowed: false
workspace_file_writes_allowed: false
publishing_enabled: false
scheduling_enabled: false
buffer_activity_enabled: false
repair_policy:
  topology_lookup_source: persisted-semantic-metadata
  name_relink_allowed_without_review: false
  approval_gate_required_for_apply: true
  approval_gate_skill: discord-approval-gate
  repair_requires_preview_first: true
  topology_reconciliation_contract: docs/architecture/discord-topology-reconciliation.md
  managed_registry_sources:
    - docs/architecture/discord-project-manager-global-init.md
    - docs/architecture/discord-project-manager-project-create.md
  managed_routing_contract: docs/architecture/discord-managed-channel-routing.md
  guide_catalog_ref: examples/discord-semantic-channel-guides.fake.yaml
status_command_contract:
  supported_commands:
    - /project-manager status
    - /project-manager repair
    - /project status
  reports_existing_channels: true
  reports_missing_channels: true
  reports_unmanaged_channels: true
  reports_unsafe_missing_ids: true
  durable_write_allowed: false
repair_command_contract:
  preview_required_before_apply: true
  apply_requires_exact_approval_phrase: approve write
  permission_preflight_required: true
  partial_apply_allowed_on_missing_permissions: false
  metadata_refresh_required_on_recreate: true
status_and_repair_scenarios:
  - scenario_ref: status-global-intact-rerun
    managed_surface: global
    command_ref: /project-manager status
    expected_category_ref: category-demo-project-manager-global
    project_ref: none
    project_slug: none
    idempotency_source_ref: examples/discord-project-manager-global-init.fake.yaml#second_run_result
    existing_fields:
      - context
      - skills
      - strategy
      - decisions
      - config
    missing_fields: []
    unmanaged_channel_refs: []
    unsafe_missing_id_fields: []
    status_result: no-op
    duplicate_category_created: false
    duplicate_channels_created: false
    write_attempted: false
    repair_preview:
      status: no-op
      permission_preflight_status: ready
      permission_missing_capabilities: []
      approval_state: not-requested
      write_executed: false
      proposed_actions: []
    audit_ref: audit-demo-status-global-intact-rerun
  - scenario_ref: repair-global-missing-config
    managed_surface: global
    command_ref: /project-manager repair
    expected_category_ref: category-demo-project-manager-global
    project_ref: none
    project_slug: none
    idempotency_source_ref: examples/discord-project-manager-global-init.fake.yaml#drift_boundary_result
    existing_fields:
      - context
      - skills
      - strategy
      - decisions
    missing_fields:
      - config
    unmanaged_channel_refs: []
    unsafe_missing_id_fields: []
    status_result: needs-repair
    write_attempted: false
    repair_preview:
      status: approval-requested
      permission_preflight_status: ready
      permission_missing_capabilities: []
      approval_state: approval-requested
      approval_phrase: approve write
      mandatory_skill: discord-approval-gate
      write_executed: false
      proposed_actions:
        - action: recreate-channel
          field_key: config
          previous_channel_ref: channel-demo-global-config
          proposed_channel_ref: channel-demo-global-config-recreated
          topic_source: examples/discord-semantic-channel-guides.fake.yaml#global.config.topic
          starter_message_source: examples/discord-semantic-channel-guides.fake.yaml#global.config.starter_message
          metadata_refresh_required: true
          refreshed_registry_field: channels.config
          refreshed_state_target: workspace-global-config
    audit_ref: audit-demo-repair-global-missing-config
  - scenario_ref: status-project-renamed-linked
    managed_surface: project
    command_ref: /project status
    expected_category_ref: category-demo-project-web-app
    project_ref: project-demo-web-app
    project_slug: web-app
    idempotency_source_ref: examples/discord-managed-channel-routing.fake.yaml#managed_channel_registry
    existing_fields:
      - context
      - skills
      - strategy
      - tasks
      - decisions
      - qa
    missing_fields: []
    unmanaged_channel_refs: []
    unsafe_missing_id_fields: []
    status_result: renamed-linked
    write_attempted: false
    renamed_binding:
      field_key: strategy
      channel_ref: channel-demo-web-app-strategy
      current_channel_name: planning
      linked_by_id: true
      relink_by_name_attempted: false
    repair_preview:
      status: no-relink-required
      permission_preflight_status: ready
      permission_missing_capabilities: []
      approval_state: not-requested
      write_executed: false
      proposed_actions:
        - action: update-guide-copy
          field_key: strategy
          previous_channel_ref: channel-demo-web-app-strategy
          proposed_channel_ref: channel-demo-web-app-strategy
          metadata_refresh_required: false
          refreshed_registry_field: none
          refreshed_state_target: project:web-app:strategy
    audit_ref: audit-demo-status-project-renamed-linked
  - scenario_ref: status-project-unsafe-missing-id
    managed_surface: project
    command_ref: /project status
    expected_category_ref: category-demo-project-web-app
    project_ref: project-demo-web-app
    project_slug: web-app

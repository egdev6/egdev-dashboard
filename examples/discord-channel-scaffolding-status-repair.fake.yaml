non_goals:
  - live Discord repair commands
  - durable writes before approval
  - automatic relink by name
  - destructive cleanup of unmanaged extra channels
  - prompt execution
  - real Discord IDs
  - raw Discord transcripts
  - production credentials
  - publishing
  - scheduling
metadata:
  note: This file contains fake Discord scaffolding status and repair data only and is safe to commit.
  no_real_guild_ids: true
  no_real_project_ids: true
  no_real_category_ids: true
  no_real_channel_ids: true
  no_real_message_ids: true
  no_credentials: true

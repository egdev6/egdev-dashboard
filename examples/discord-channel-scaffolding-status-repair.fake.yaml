    existing_fields:
      - context
      - skills
      - strategy
      - decisions
      - qa
    missing_fields:
      - tasks
    unmanaged_channel_refs: []
    unsafe_missing_id_fields:
      - tasks
    status_result: unsafe-missing-id
    write_attempted: false
    possible_name_match_ref: channel-demo-web-app-tasks-unlinked
    auto_linked_by_name: false
    operator_message: Persisted ID for the tasks field is missing; a same-named channel was observed, but no relink was applied without review.
    repair_preview:
      status: needs-review
      permission_preflight_status: ready
      permission_missing_capabilities: []
      approval_state: not-requested
      write_executed: false
      proposed_actions: []
    audit_ref: audit-demo-status-project-unsafe-missing-id
  - scenario_ref: repair-project-partial-failure-retry
    managed_surface: project
    command_ref: /project-manager repair
    expected_category_ref: category-demo-project-web-app
    project_ref: project-demo-web-app
    project_slug: web-app
    idempotency_source_ref: examples/discord-project-manager-project-create.fake.yaml#partial_failure_audit
    existing_fields:
      - context
      - strategy
    missing_fields:
      - tasks
    unmanaged_channel_refs: []
    unsafe_missing_id_fields: []
    status_result: needs-repair
    write_attempted: false
    repair_preview:
      status: approval-requested
      permission_preflight_status: ready
      permission_missing_capabilities: []
      approval_state: approval-requested
      approval_phrase: approve write
      mandatory_skill: discord-approval-gate
      write_executed: false
      retry_source: partial-failure-audit
      safe_retry_token_ref: retry-demo-web-app-create
      proposed_actions:
        - action: recreate-channel
          field_key: tasks
          previous_channel_ref: channel-demo-web-app-tasks
          proposed_channel_ref: channel-demo-web-app-tasks-recreated
          topic_source: examples/discord-semantic-channel-guides.fake.yaml#project.tasks.topic
          starter_message_source: examples/discord-semantic-channel-guides.fake.yaml#project.tasks.starter_message
          metadata_refresh_required: true
          refreshed_registry_field: channels.tasks
          refreshed_state_target: project:web-app:tasks
    audit_ref: audit-demo-repair-project-partial-failure-retry
  - scenario_ref: repair-project-permission-blocked
    managed_surface: project
    command_ref: /project-manager repair
    expected_category_ref: category-demo-project-web-app
    project_ref: project-demo-web-app
    project_slug: web-app
    idempotency_source_ref: examples/discord-project-manager-project-create.fake.yaml#partial_failure_audit
    existing_fields:
      - context
      - strategy
    missing_fields:
      - tasks
    unmanaged_channel_refs: []
    unsafe_missing_id_fields: []
    status_result: needs-repair

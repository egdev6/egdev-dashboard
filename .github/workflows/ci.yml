name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository-contracts:
    name: Repository contracts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install lint tools
        run: python -m pip install --disable-pip-version-check yamllint

      - name: Check repository whitespace
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            git diff --check "origin/${GITHUB_BASE_REF}...HEAD"
          elif [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --check "${BEFORE_SHA}..HEAD"
          else
            empty_tree="$(git hash-object -t tree /dev/null)"
            git diff --check "${empty_tree}..HEAD"
          fi

      - name: Check shell syntax
        shell: bash
        run: |
          set -euo pipefail
          find scripts -type f -name "*.sh" -print0 | sort -z | while IFS= read -r -d '' script; do
            echo "Checking ${script}"
            bash -n "${script}"
          done

      - name: Lint YAML
        run: yamllint .

      - name: Lint Markdown
        run: npx --yes markdownlint-cli2@0.18.1 "**/*.md"

  memory-roundtrips:
    name: Local Engram memory roundtrips
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: false

      - name: Install Engram CLI
        run: |
          go install github.com/Gentleman-Programming/engram/cmd/engram@v1.15.13
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Show Engram version
        run: engram version

      - name: Run disposable local memory validations
        shell: bash
        run: |
          set -euo pipefail
          find scripts -type f -name "validate-*-memory.sh" -print0 | sort -z | while IFS= read -r -d '' script; do
            echo "::group::${script}"
            "${script}"
            echo "::endgroup::"
          done

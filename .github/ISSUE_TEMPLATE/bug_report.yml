name: Bug report
description: Report a reproducible problem in runtime, docs, or repository workflow
labels:
  - bug
  - status:needs-review
body:
  - type: markdown
    attributes:
      value: |
        Use this template for confirmed bugs.
        A maintainer must add `status:approved` before implementation starts or a PR is opened.
        Normal bugfix PRs target `develop`; urgent released-code hotfixes may target `main`.
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I can describe how to reproduce the problem
          required: true
        - label: I removed or sanitized real Discord IDs, tokens, credentials, screenshots, raw logs, transcripts, and private payloads
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Bug summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide numbered steps or commands. Use sanitized examples only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Summarize what happened. Do not paste private runtime payloads.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Docker Compose
        - OpenClaw runtime
        - Discord runtime
        - Managed registry
        - Engram memory
        - Skill behavior
        - Documentation
        - CI/Workflows
        - Security
        - Other
    validations:
      required: true
  - type: textarea
    id: sanitized_output
    attributes:
      label: Sanitized logs or output
      description: Paste only sanitized output. Replace Discord snowflakes/private values with placeholders.
      render: shell
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: How should the fix be verified after implementation?
      placeholder: |
        - Reproduction fails before fix and passes after fix.
        - `bash scripts/run-safe-validation-suite.sh`
        - Private runtime check summarized with sanitized evidence only, if needed.
    validations:
      required: true

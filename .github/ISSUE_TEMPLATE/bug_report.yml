name: Bug report
description: Report a reproducible problem in runtime, docs, or repository workflow
labels:
  - bug
  - status:needs-review
body:
  - type: markdown
    attributes:
      value: |
        Use this template for confirmed bugs. A maintainer must add `status:approved` before implementation starts.
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I can describe how to reproduce the problem
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Bug summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide numbered steps, commands, or screenshots.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Docker Compose
        - OpenClaw runtime
        - Engram memory
        - Skill behavior
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell

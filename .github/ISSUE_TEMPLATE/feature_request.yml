name: Feature request
description: Propose a roadmap item or repository improvement
labels:
  - enhancement
  - status:needs-review
body:
  - type: markdown
    attributes:
      value: |
        Use this template for planned feature or repository improvement work.
        A maintainer must add `status:approved` before implementation starts or a PR is opened.
        Normal feature PRs should target `develop`; release-promotion PRs target `main`.
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I understand this issue must be approved before implementation starts
          required: true
        - label: I will not include real Discord IDs, tokens, credentials, screenshots, raw logs, transcripts, or private payloads in public evidence
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point or gap does this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the outcome and user-facing behavior.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Runtime
        - Memory
        - Skills
        - Docs
        - Process
        - CI/Workflows
        - Security
        - Analytics
        - Dashboard
        - Other
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the observable conditions that make this done.
      placeholder: |
        - [ ] Behavior is documented.
        - [ ] Safe validation command passes.
        - [ ] No private runtime data is committed or pasted into GitHub.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: Which commands, smoke tests, manual checks, or fake-first fixtures should prove this work?
      placeholder: |
        - `bash scripts/run-safe-validation-suite.sh`
        - Runtime smoke test, if applicable
        - Private manual verification with sanitized summary only, if applicable
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, references, risks, target milestone, or related roadmap items.
